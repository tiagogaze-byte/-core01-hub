<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORE-01 | HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111318;--ink2:#3c4150;--ink3:#6b7280;
  --paper:#f8f9fb;--paper2:#f1f3f7;--paper3:#e8ebf0;
  --rule:rgba(17,19,24,.08);
  --lincoln:#4338ca;--marilda:#be185d;--ale:#047857;
  --accent:#2563eb;
  --cyan:#0891b2;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}
.mi{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;font-size:18px;font-family:'Material Symbols Outlined'}

/* ── LOGIN ── */
#pg-login{display:flex;min-height:100vh;align-items:center;justify-content:center;background:var(--ink);position:relative;overflow:hidden}
.login-bg-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:28px 28px}
.login-card{position:relative;z-index:10;background:#1a1d27;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:44px;width:100%;max-width:380px}
.lc-logo{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35);font-family:'IBM Plex Mono',monospace;margin-bottom:28px;display:flex;align-items:center;gap:8px}
.lc-logo::before{content:'';width:16px;height:1px;background:rgba(255,255,255,.25)}
.lc-title{font-size:30px;font-weight:700;color:#fff;letter-spacing:-.03em;margin-bottom:6px}
.lc-sub{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:36px;line-height:1.5}
.lc-field{margin-bottom:14px}
.lc-label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.lc-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;color:#fff;font-size:14px;outline:none;font-family:'IBM Plex Mono',monospace;transition:border-color .2s}
.lc-input:focus{border-color:rgba(255,255,255,.3)}
.lc-input::placeholder{color:rgba(255,255,255,.2)}
.lc-btn{width:100%;padding:12px;background:#fff;color:var(--ink);font-size:13px;font-weight:700;letter-spacing:.04em;border:none;border-radius:5px;cursor:pointer;margin-top:6px;transition:all .2s;font-family:'Inter',sans-serif}
.lc-btn:hover{background:rgba(255,255,255,.9)}
.lc-btn:disabled{opacity:.5;cursor:not-allowed}
.lc-err{font-size:12px;color:#f87171;text-align:center;margin-top:12px;font-family:'IBM Plex Mono',monospace;display:none}

/* ── HUB ── */
#pg-hub{display:none;flex-direction:column;min-height:100vh}

.hub-header{
  background:#fff;border-bottom:1px solid var(--rule);
  padding:0 40px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hub-wordmark{font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.hub-wordmark .wm-tag{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:var(--paper2);color:var(--ink3);font-family:'IBM Plex Mono',monospace}
.hub-user{display:flex;align-items:center;gap:12px}
.hub-user-name{font-size:12px;font-weight:500;color:var(--ink3)}
.hub-user-role{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:var(--paper3);color:var(--ink3);font-family:'IBM Plex Mono',monospace}
.hub-logout{background:none;border:none;cursor:pointer;color:var(--ink3);display:flex;align-items:center;gap:4px;font-size:12px;padding:4px;transition:color .2s}
.hub-logout:hover{color:var(--ink)}

/* FILTROS */
.hub-filters{
  background:#fff;border-bottom:1px solid var(--rule);
  padding:0 40px;height:44px;
  display:flex;align-items:center;gap:4px;
  position:sticky;top:52px;z-index:90;overflow-x:auto;
}
.fpill{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;font-family:'Inter',sans-serif;transition:all .15s;background:transparent;white-space:nowrap}
.fpill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.fpill:not(.active){color:var(--ink3);border-color:var(--paper3)}
.fpill:not(.active):hover{border-color:var(--ink3);color:var(--ink)}
.fpill-lincoln.active{background:var(--lincoln);border-color:var(--lincoln)}
.fpill-marilda.active{background:var(--marilda);border-color:var(--marilda)}
.fpill-ale.active{background:var(--ale);border-color:var(--ale)}
.fsep{width:1px;height:18px;background:var(--rule);flex-shrink:0;margin:0 6px}

/* HERO */
.hub-hero{padding:36px 40px 28px;border-bottom:1px solid var(--rule);background:#fff}
.hub-hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:8px}
.hub-hero h1{font-size:clamp(24px,4vw,36px);font-weight:700;letter-spacing:-.03em;color:var(--ink);line-height:1.1}
.hub-hero h1 span{color:var(--ink3);font-weight:400}
.hub-hero-meta{text-align:right;flex-shrink:0}
.hub-hero-date{font-size:11px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;text-transform:uppercase}
.hub-hero-count{font-size:32px;font-weight:700;color:var(--ink);letter-spacing:-.04em;line-height:1}
.hub-hero-count-label{font-size:10px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;font-family:'IBM Plex Mono',monospace}
.hub-resumo{font-size:14px;color:var(--ink3);line-height:1.6;max-width:560px}

/* MAIN */
.hub-main{max-width:1160px;margin:0 auto;padding:28px 40px 80px;width:100%}

/* KANBAN */
.kanban-day{margin-bottom:40px}
.day-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--rule);position:sticky;top:96px;background:var(--paper);z-index:20;padding-top:8px}
.day-label{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.day-badge{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:100px;border:1.5px solid}
.day-badge.recente{background:var(--ink);color:#fff;border-color:var(--ink)}
.day-badge.arquivo{color:var(--ink3);border-color:var(--paper3)}
.day-count{font-size:11px;color:var(--ink3);margin-left:auto;font-family:'IBM Plex Mono',monospace}

.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* CARDS */
.pauta-card{
  background:#fff;border:1px solid var(--rule);border-radius:6px;
  padding:20px;display:flex;flex-direction:column;gap:12px;
  transition:all .2s;position:relative;overflow:hidden;
}
.pauta-card:hover{border-color:rgba(17,19,24,.16);box-shadow:0 4px 16px rgba(17,19,24,.06)}
.pauta-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.pauta-card.lincoln::before{background:var(--lincoln)}
.pauta-card.marilda::before{background:var(--marilda)}
.pauta-card.ale::before{background:var(--ale)}

.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-mandato{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.card-mandato.lincoln{color:var(--lincoln)}
.card-mandato.marilda{color:var(--marilda)}
.card-mandato.ale{color:var(--ale)}
.card-prio{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:100px}
.prio-alta{background:#fef2f2;color:#dc2626}
.prio-media{background:#fffbeb;color:#d97706}
.prio-baixa{background:#f0fdf4;color:#16a34a}

.card-titulo{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.02em;line-height:1.3}
.card-desc{font-size:13px;color:var(--ink3);line-height:1.65;flex:1}
.card-acao{font-size:12px;font-weight:500;color:var(--ink2);padding:8px 10px;background:var(--paper2);border-radius:4px;border-left:2px solid var(--paper3);line-height:1.4}

.card-copy{background:var(--paper2);border-radius:4px;padding:12px}
.card-copy-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.card-copy-text{font-size:12px;color:var(--ink2);line-height:1.6;font-family:'IBM Plex Mono',monospace}
.card-copy-btn{margin-top:8px;padding:5px 14px;background:var(--ink);color:#fff;border:none;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.card-copy-btn:hover{background:var(--ink2)}
.card-copy-btn.copied{background:var(--ale)}

.card-extra{font-size:11px;line-height:1.55;padding:8px 10px;border-radius:4px}
.card-trend{background:#fff7ed;color:#9a3412;border-left:2px solid #f97316}
.card-insight{background:#fdf4ff;color:#7e22ce;border-left:2px solid #a855f7}
.card-extra-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px;opacity:.7;font-family:'IBM Plex Mono',monospace}

/* EMPTY + LOADER */
.hub-empty{text-align:center;padding:72px 20px;color:var(--ink3)}
.hub-empty h3{font-size:18px;font-weight:600;color:var(--ink2);margin-bottom:6px;letter-spacing:-.01em}
.hub-empty p{font-size:13px;line-height:1.7}
.loader{text-align:center;padding:72px 20px}
.loader-dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px}
.loader-dots span{width:7px;height:7px;border-radius:50%;background:var(--ink3);animation:bounce .8s infinite}
.loader-dots span:nth-child(2){animation-delay:.15s}
.loader-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}

/* FOOTER */
.hub-footer{background:#fff;border-top:1px solid var(--rule);padding:20px 40px;display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.hub-footer .wm{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.hub-footer .links{display:flex;gap:20px}
.hub-footer .links a{font-size:12px;color:var(--ink3);text-decoration:none;transition:color .2s}
.hub-footer .links a:hover{color:var(--ink)}
.hub-footer .copy{font-size:11px;color:var(--ink3);font-family:'IBM Plex Mono',monospace}

@media(max-width:900px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .hub-header,.hub-filters,.hub-hero{padding-left:20px;padding-right:20px}
  .hub-main{padding:20px 20px 60px}
  .cards-grid{grid-template-columns:1fr}
  .hub-hero-top{flex-direction:column}
  .hub-hero-meta{text-align:left}
  .hub-footer{flex-direction:column;gap:12px;text-align:center;padding:16px 20px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="pg-login">
  <div class="login-bg-dots"></div>
  <div class="login-card">
    <div class="lc-logo">CORE-01 · HUB</div>
    <div class="lc-title">Acesso</div>
    <div class="lc-sub">Entre com suas credenciais para acessar as pautas da semana.</div>
    <div class="lc-field">
      <label class="lc-label">Email</label>
      <input class="lc-input" type="email" id="l-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="lc-field">
      <label class="lc-label">Senha</label>
      <input class="lc-input" type="password" id="l-pass" placeholder="••••••••">
    </div>
    <button class="lc-btn" id="l-btn" onclick="doLogin()">ENTRAR</button>
    <div class="lc-err" id="l-err"></div>
  </div>
</div>

<!-- HUB -->
<div id="pg-hub">
  <header class="hub-header">
    <div class="hub-wordmark">
      CORE-01 <span class="wm-tag">HUB</span>
    </div>
    <div class="hub-user">
      <span class="hub-user-name" id="user-name"></span>
      <span class="hub-user-role" id="user-role"></span>
      <button class="hub-logout" onclick="logout()">
        <span class="mi" style="font-size:16px">logout</span> Sair
      </button>
    </div>
  </header>

  <div class="hub-filters">
    <button class="fpill active" data-f="todos" onclick="setFiltro('todos')">Todos</button>
    <div class="fsep"></div>
    <button class="fpill fpill-lincoln" data-f="lincoln" onclick="setFiltro('lincoln')">🏛 Lincoln</button>
    <button class="fpill fpill-marilda" data-f="marilda" onclick="setFiltro('marilda')">🌸 Marilda</button>
    <button class="fpill fpill-ale" data-f="ale" onclick="setFiltro('ale')">⚖️ Alê</button>
  </div>

  <div class="hub-hero">
    <div class="hub-hero-top">
      <h1>Pautas da <span>Semana</span></h1>
      <div class="hub-hero-meta">
        <div class="hub-hero-date" id="hub-date"></div>
        <div class="hub-hero-count" id="hub-count">—</div>
        <div class="hub-hero-count-label">pautas esta semana</div>
      </div>
    </div>
    <div class="hub-resumo" id="hub-resumo">Carregando...</div>
  </div>

  <div class="hub-main">
    <div id="hub-content">
      <div class="loader">
        <div class="loader-dots"><span></span><span></span><span></span></div>
        <p style="font-size:13px;color:var(--ink3)">Carregando pautas...</p>
      </div>
    </div>
  </div>

  <footer class="hub-footer">
    <div class="wm">CORE-01</div>
    <div class="links">
      <a href="#">Privacidade</a>
      <a href="#">Termos</a>
    </div>
    <div class="copy">© 2026</div>
  </footer>
</div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let token = localStorage.getItem('hub_token') || '';
let currentUser = null;
let filtroAtivo = 'todos';
let todosOsDias = [];
let heartbeatInterval = null;
let sessionStart = Date.now();

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
window.addEventListener('load', async () => {
  document.getElementById('hub-date').textContent =
    new Date().toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

  if (token) {
    const ok = await verificarSessao();
    if (ok) { mostrarHub(); return; }
  }
  mostrarLogin();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('pg-login').style.display !== 'none') doLogin();
});

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  const btn = document.getElementById('l-btn');
  const err = document.getElementById('l-err');
  err.style.display = 'none';
  if (!email || !password) { mostrarErro('Preencha email e senha'); return; }
  btn.disabled = true; btn.textContent = 'ENTRANDO...';
  try {
    const r = await fetch('/api/auth?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const d = await r.json();
    if (!d.ok) { mostrarErro(d.error || 'Erro ao entrar'); btn.disabled = false; btn.textContent = 'ENTRAR'; return; }
    token = d.token;
    currentUser = d.user;
    localStorage.setItem('hub_token', token);
    mostrarHub();
  } catch { mostrarErro('Erro de conexão'); btn.disabled = false; btn.textContent = 'ENTRAR'; }
}

async function verificarSessao() {
  try {
    const r = await fetch('/api/auth?action=verify', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    if (d.ok) { currentUser = d.user; return true; }
    return false;
  } catch { return false; }
}

async function logout() {
  track('logout', {});
  clearInterval(heartbeatInterval);
  await fetch('/api/auth?action=logout', {
    method: 'POST', headers: { Authorization: 'Bearer ' + token }
  }).catch(() => {});
  token = ''; currentUser = null;
  localStorage.removeItem('hub_token');
  mostrarLogin();
}

function mostrarErro(msg) {
  const e = document.getElementById('l-err');
  e.textContent = msg; e.style.display = 'block';
}

function mostrarLogin() {
  document.getElementById('pg-login').style.display = 'flex';
  document.getElementById('pg-hub').style.display = 'none';
}

function mostrarHub() {
  document.getElementById('pg-login').style.display = 'none';
  document.getElementById('pg-hub').style.display = 'flex';
  document.getElementById('user-name').textContent = currentUser?.name || '';
  document.getElementById('user-role').textContent = currentUser?.role || 'assessor';
  track('page_view', { page: 'hub' });
  iniciarHeartbeat();
  carregarHub();
}

// ═══════════════════════════════════════
//  ANALYTICS
// ═══════════════════════════════════════
async function track(type, data) {
  if (!token) return;
  fetch('/api/analytics?action=track', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({ type, data }),
  }).catch(() => {});
}

function iniciarHeartbeat() {
  clearInterval(heartbeatInterval);
  heartbeatInterval = setInterval(() => {
    track('heartbeat', { sessionSeconds: Math.round((Date.now() - sessionStart) / 1000) });
  }, 30000);
}

// ═══════════════════════════════════════
//  HUB
// ═══════════════════════════════════════
async function carregarHub() {
  try {
    const r = await fetch('/api/briefing?limit=7', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    if (!d.ok || !d.briefings?.length) {
      document.getElementById('hub-content').innerHTML = `<div class="hub-empty"><h3>Sem pautas publicadas</h3><p>O briefing desta semana ainda não foi publicado.</p></div>`;
      document.getElementById('hub-resumo').textContent = 'Sem briefing publicado esta semana.';
      return;
    }
    const ultimo = d.briefings[0];
    if (ultimo?.resumo) document.getElementById('hub-resumo').textContent = ultimo.resumo;
    let total = 0;
    d.briefings.forEach(b => Object.values(b.mandatos || {}).forEach(m => { total += m?.cards?.length || 0; }));
    document.getElementById('hub-count').textContent = total;
    todosOsDias = d.briefings;
    renderKanban();
  } catch (e) {
    document.getElementById('hub-content').innerHTML = `<div class="hub-empty"><h3>Erro ao carregar</h3><p>${e.message}</p></div>`;
  }
}

function setFiltro(f) {
  filtroAtivo = f;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-f="${f}"]`)?.classList.add('active');
  renderKanban();
  track('filter_change', { filter: f });
}

function renderKanban() {
  const content = document.getElementById('hub-content');
  if (!todosOsDias.length) return;

  // Identifica mais recente pelo timestamp
  const maisRecente = todosOsDias.reduce((a, b) =>
    new Date(a.timestamp) > new Date(b.timestamp) ? a : b);

  const diasHtml = todosOsDias.map(briefing => {
    const isRecente = briefing.id === maisRecente.id;
    const cards = [];
    Object.entries(briefing.mandatos || {}).forEach(([key, m]) => {
      if (!m?.cards?.length) return;
      if (filtroAtivo !== 'todos' && filtroAtivo !== key) return;
      m.cards.forEach(c => cards.push({ ...c, mandatoKey: key, cargo: m.cargo }));
    });
    if (!cards.length) return '';
    return `
      <div class="kanban-day">
        <div class="day-header">
          <div class="day-label">${briefing.data || '—'}</div>
          <span class="day-badge ${isRecente ? 'recente' : 'arquivo'}">${isRecente ? 'Mais recente' : 'Arquivo'}</span>
          <div class="day-count">${cards.length} pauta${cards.length > 1 ? 's' : ''}</div>
        </div>
        <div class="cards-grid">${cards.map(c => buildCard(c)).join('')}</div>
      </div>`;
  }).filter(Boolean).join('');

  content.innerHTML = diasHtml || `<div class="hub-empty"><h3>Sem pautas para este filtro</h3><p>Tente selecionar outro mandato.</p></div>`;

  // Observa os cards para rastrear visualização
  observeCards();
}

function buildCard(c) {
  const mandato = c.mandatoKey;
  const prio = c.prioridade || 'media';
  const pLabels = { alta:'Alta', media:'Média', baixa:'Baixa' };
  const mLabels = { lincoln:'🏛 Lincoln', marilda:'🌸 Marilda', ale:'⚖️ Alê' };
  const cardId = `card-${Math.random().toString(36).slice(2,7)}`;

  return `
    <div class="pauta-card ${mandato}" id="${cardId}" data-title="${(c.titulo||'').replace(/"/g,"'")}" data-mandato="${mandato}">
      <div class="card-top">
        <span class="card-mandato ${mandato}">${mLabels[mandato]||mandato}</span>
        <span class="card-prio prio-${prio}">${pLabels[prio]}</span>
      </div>
      <div class="card-titulo">${c.titulo||'—'}</div>
      <div class="card-desc">${c.descricao||''}</div>
      ${c.acao?`<div class="card-acao">→ ${c.acao}</div>`:''}
      ${c.copy?`
        <div class="card-copy">
          <div class="card-copy-label">Copy para redes</div>
          <div class="card-copy-text">${c.copy}</div>
          <button class="card-copy-btn" onclick="copiar(this,'${(c.copy||'').replace(/'/g,"&#39;").replace(/\n/g,' ')}','${(c.titulo||'').replace(/'/g,"&#39;")}','${mandato}')">Copiar texto</button>
        </div>`:''}
      ${c.trend?`<div class="card-extra card-trend"><span class="card-extra-label">📈 Trend</span>${c.trend}</div>`:''}
      ${c.insight?`<div class="card-extra card-insight"><span class="card-extra-label">💡 Insight</span>${c.insight}</div>`:''}
    </div>`;
}

function copiar(btn, texto, titulo, mandato) {
  navigator.clipboard.writeText(texto).then(() => {
    btn.textContent = '✓ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar texto'; btn.classList.remove('copied'); }, 2000);
    track('copy_click', { copyPreview: texto.substring(0, 80), cardTitle: titulo, mandato });
  });
}

// Intersection Observer para rastrear cards vistos
function observeCards() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const title = el.dataset.title;
        const mandato = el.dataset.mandato;
        if (title) track('card_view', { cardTitle: title, mandato });
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.pauta-card').forEach(card => observer.observe(card));
}

// Antes de sair, registra
window.addEventListener('beforeunload', () => {
  track('page_exit', { sessionSeconds: Math.round((Date.now() - sessionStart) / 1000) });
});
</script>
